name: DeepSeekBankbreaknt
options:
  bundleIdPrefix: com.deepseek
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"

targets:
  DeepSeekBankbreaknt:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Providers
      - path: Services
      - path: Utils
      - path: ViewModels
      - path: Views
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepseek.bankbreaknt
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "DeepSeek Bankbreaknt"
        INFOPLIST_KEY_LSUIElement: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    entitlements:
      path: DeepSeekBankbreaknt.entitlements
      properties:
        com.apple.security.app-sandbox: false